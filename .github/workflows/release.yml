name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build binaries
        run: |
          for os in linux darwin windows; do
            for arch in amd64 arm64; do
              ext=""
              if [ "$os" = "windows" ]; then ext=".exe"; fi
              output="ep-${os}-${arch}${ext}"
              GOOS=$os GOARCH=$arch go build -ldflags="-X main.version=${{ steps.version.outputs.VERSION }}" -o "$output" ./cmd
              echo "$output"
              ls -lh "$output"
            done
          done

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ep-*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
